<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Golf Leaderboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a5d1a 0%, #0d3d0d 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 3rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }
        
        .header .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        
        
        .dashboard-frame {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .frame-header {
            background: linear-gradient(135deg, #2d5a2d 0%, #1a3d1a 100%);
            color: white;
            padding: 15px 25px;
            font-size: 1.3rem;
            font-weight: bold;
        }
        
        .frame-content {
            padding: 20px;
            background: #f9f9f9;
        }
        
        .dashboard-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .dashboard-frame.half {
            flex: 1;
            margin-bottom: 0;
        }
        
        .dashboard-frame.third {
            flex: 1;
            margin-bottom: 0;
        }
        
        iframe {
            width: 100%;
            border: none;
            background: white;
        }
        
        .frame-content {
            overflow: hidden;
        }
        
        .frame-content iframe {
            margin-bottom: -50px; /* Hide footer by cropping */
        }
        
        .footer-status {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 0.8rem;
            margin-top: 10px;
            padding: 8px;
        }
        
        .btn-small {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 4px 10px;
            font-size: 0.8rem;
            border-radius: 10px;
            cursor: pointer;
            margin-left: 10px;
        }
        
        .btn-small:hover {
            background: rgba(255,255,255,0.3);
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            
            body {
                padding: 10px;
            }
            
            .dashboard-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⛳ Mini Golf Leaderboard</h1>
        </div>
        
        <div class="dashboard-row">
            <div class="dashboard-frame half">
                <div class="frame-header">🏆 Team Leaderboard</div>
                <div class="frame-content">
                    <iframe 
                        id="teamLeaderboardFrame"
                        height="300" 
                        scrolling="no" 
                        src="https://sonusnetworks.sharepoint.com/sites/PMBITeam/_layouts/15/Doc.aspx?sourcedoc={c084a68d-6c06-4a1b-8b07-c4be3b56e230}&action=embedview&wdAllowInteractivity=False&Item=TeamBoard&wdHideGridlines=True&wdInConfigurator=True&wdInConfigurator=True&edaebf=rslc0">
                    </iframe>
                </div>
            </div>
            
            <div class="dashboard-frame half">
                <div class="frame-header">🧑 Individual Leaderboard</div>
                <div class="frame-content">
                    <iframe 
                        id="individualLeaderboardFrame"
                        height="300" 
                        scrolling="no" 
                        src="https://sonusnetworks.sharepoint.com/sites/PMBITeam/_layouts/15/Doc.aspx?sourcedoc={c084a68d-6c06-4a1b-8b07-c4be3b56e230}&action=embedview&wdAllowInteractivity=False&Item=LeadershipMember!MemberBoard&wdHideGridlines=True&wdInConfigurator=True&wdInConfigurator=True&edaebf=rslc0">
                    </iframe>
                </div>
            </div>
        </div>
        
        <div class="dashboard-row">
            <div class="dashboard-frame third">
                <div class="frame-header">&#127939; Hole-in-One Tracker</div>
                <div class="frame-content">
                    <iframe 
                        id="holeInOneFrame"
                        height="250" 
                        scrolling="no" 
                        src="https://sonusnetworks.sharepoint.com/sites/PMBITeam/_layouts/15/Doc.aspx?sourcedoc={c084a68d-6c06-4a1b-8b07-c4be3b56e230}&action=embedview&wdAllowInteractivity=False&Item=PivotTable2&wdHideGridlines=True&wdInConfigurator=True&wdInConfigurator=True&edaebf=rslc0">
                    </iframe>
                </div>
            </div>
            
            <div class="dashboard-frame third">
                <div class="frame-header">&#127919; Hole Stats</div>
                <div class="frame-content">
                    <iframe 
                        id="holeStatsFrame"
                        height="250" 
                        scrolling="no"
                        style="overflow: hidden;"
                        src="https://sonusnetworks.sharepoint.com/sites/PMBITeam/_layouts/15/Doc.aspx?sourcedoc={c084a68d-6c06-4a1b-8b07-c4be3b56e230}&action=embedview&wdAllowInteractivity=False&Item=HoleStats&wdHideGridlines=True&wdInConfigurator=True&wdInConfigurator=True&edaebf=rslc0">
                    </iframe>
                </div>
            </div>
            
            <div class="dashboard-frame third">
                <div class="frame-header">🏆 Best Hole Design</div>
                <div class="frame-content">
                    <iframe 
                        id="bestHoleDesignFrame"
                        height="250" 
                        scrolling="no" 
                        src="https://sonusnetworks.sharepoint.com/sites/PMBITeam/_layouts/15/Doc.aspx?sourcedoc={d98c2e4c-35f5-403f-944a-91416a482496}&action=embedview&wdAllowInteractivity=False&Item=PivotTable1&wdHideGridlines=True&wdInConfigurator=True&wdInConfigurator=True&edaebf=rslc0">
                    </iframe>
                </div>
            </div>
        </div>
        
        <div class="footer-status">
            Auto-refresh in <span id="countdown">30</span>s | Last updated: <span id="lastUpdate">-</span>
            <button class="btn-small" onclick="refreshNow()">🔄</button>
            <button class="btn-small" onclick="toggleAutoRefresh()">⏸️</button>
        </div>
    </div>

    <script>
        let countdown = 30;
        let autoRefreshEnabled = true;
        let countdownInterval;
        
        function refreshFrame() {
            // Full page reload to ensure SharePoint cache is bypassed
            location.reload();
        }
        
        function refreshNow() {
            refreshFrame();
            countdown = 30;
            document.getElementById('countdown').textContent = countdown;
        }
        
        function toggleAutoRefresh() {
            autoRefreshEnabled = !autoRefreshEnabled;
            const btn = event.target;
            if (autoRefreshEnabled) {
                btn.textContent = '⏸️ Pause Auto-Refresh';
                startCountdown();
            } else {
                btn.textContent = '▶️ Resume Auto-Refresh';
                clearInterval(countdownInterval);
            }
        }
        
        function startCountdown() {
            countdownInterval = setInterval(() => {
                if (!autoRefreshEnabled) return;
                
                countdown--;
                document.getElementById('countdown').textContent = countdown;
                
                if (countdown <= 0) {
                    refreshFrame();
                    countdown = 30;
                }
            }, 1000);
        }
        
        // Initialize
        document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
        startCountdown();
    </script>
</body>
</html>
