<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Golf Score Entry</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a5f2a 0%, #2e7d32 50%, #43a047 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            color: #2e7d32;
            margin: 0;
            font-size: 28px;
        }
        .hole-display {
            background: linear-gradient(135deg, #1976d2, #1565c0);
            color: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 25px;
        }
        .hole-display .label { font-size: 16px; opacity: 0.9; }
        .hole-display .number { font-size: 64px; font-weight: bold; line-height: 1; }
        .hole-display .par { font-size: 14px; opacity: 0.8; margin-top: 5px; }
        .hole-display .name { font-size: 18px; font-weight: 600; margin-top: 8px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #2e7d32;
        }
        
        .strokes-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }
        .stroke-btn {
            padding: 15px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .stroke-btn:hover { border-color: #2e7d32; }
        .stroke-btn.selected {
            background: #2e7d32;
            color: white;
            border-color: #2e7d32;
        }
        .stroke-btn.hole-in-one.selected {
            background: #ffd700;
            color: #333;
            border-color: #ffd700;
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2e7d32, #43a047);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(46,125,50,0.4);
        }
        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .status {
            text-align: center;
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            display: none;
        }
        .status.success {
            display: block;
            background: #e8f5e9;
            color: #2e7d32;
        }
        .status.error {
            display: block;
            background: #ffebee;
            color: #c62828;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>⛳ Mini Golf</h1>
        </div>
        
        <div class="hole-display">
            <div class="label">HOLE</div>
            <div class="number" id="holeNum">1</div>
            <div class="name" id="holeName">Birdie RAMPage</div>
        </div>
        
        <div class="form-group">
            <label>👥 Select Your Team</label>
            <select id="teamSelect" onchange="updateMembers()">
                <option value="">-- Select Team --</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>🧑 Select Team Member</label>
            <select id="memberSelect">
                <option value="">-- Select Member --</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>🏌️ Number of Strokes</label>
            <div class="strokes-grid">
                <button class="stroke-btn hole-in-one" data-strokes="1">1</button>
                <button class="stroke-btn" data-strokes="2">2</button>
                <button class="stroke-btn selected" data-strokes="3">3</button>
                <button class="stroke-btn" data-strokes="4">4</button>
                <button class="stroke-btn" data-strokes="5">5</button>
                <button class="stroke-btn" data-strokes="6">6</button>
                <button class="stroke-btn" data-strokes="7">7</button>
                <button class="stroke-btn" data-strokes="8">8</button>
                <button class="stroke-btn" data-strokes="9">9</button>
                <button class="stroke-btn" data-strokes="10">10+</button>
            </div>
        </div>
        
        <button class="submit-btn" id="submitBtn" onclick="submitScore()">
            Submit Score
        </button>
        
        <div class="status" id="status"></div>
        
        <div class="footer">
            Scan QR code at each hole to enter your score
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIGURATION - Loaded from config.json
        // ============================================================
        
        let CONFIG = null;
        let HOLE_PARS = {};
        let HOLE_NAMES = {};
        let TEAMS = [];
        
        // MS Forms settings (will be loaded from config.json)
        let MS_FORMS_BASE_URL = '';
        let QUESTION_IDS = {};
        
        // Get hole number from URL parameter: ?hole=5
        const params = new URLSearchParams(window.location.search);
        const holeNumber = params.get('hole') || '1';
        let parValue = 3;
        let holeName = '';
        let selectedStrokes = 3;
        
        // ============================================================
        // LOAD CONFIG AND INITIALIZE
        // ============================================================
        
        async function loadConfig() {
            try {
                const response = await fetch('config.json');
                CONFIG = await response.json();
                
                // Load MS Forms settings
                MS_FORMS_BASE_URL = CONFIG.msFormsUrl;
                QUESTION_IDS = CONFIG.questionIds;
                
                // Build hole data
                CONFIG.holes.forEach(hole => {
                    HOLE_PARS[hole.number] = hole.par;
                    HOLE_NAMES[hole.number] = hole.name;
                });
                
                // Load teams
                TEAMS = CONFIG.teams;
                
                // Initialize the form
                initializeForm();
            } catch (error) {
                console.error('Error loading config:', error);
                showStatus('Error loading configuration', 'error');
            }
        }
        
        function initializeForm() {
            // Set hole info
            parValue = HOLE_PARS[parseInt(holeNumber)] || 3;
            holeName = HOLE_NAMES[parseInt(holeNumber)] || '';
            selectedStrokes = parValue;
            
            document.getElementById('holeNum').textContent = holeNumber;
            document.getElementById('holeName').textContent = holeName;
            
            // Populate team dropdown
            const teamSelect = document.getElementById('teamSelect');
            teamSelect.innerHTML = '<option value="">-- Select Team --</option>';
            TEAMS.forEach(team => {
                const option = document.createElement('option');
                option.value = team.name;
                option.textContent = team.name;
                teamSelect.appendChild(option);
            });
            
            // Restore last selected team and member from localStorage
            const savedTeam = localStorage.getItem('minigolf_team');
            const savedMember = localStorage.getItem('minigolf_member');
            
            if (savedTeam) {
                teamSelect.value = savedTeam;
                updateMembers();
                if (savedMember) {
                    document.getElementById('memberSelect').value = savedMember;
                }
            }
            
            // Pre-select par as default strokes
            document.querySelectorAll('.stroke-btn').forEach(btn => {
                btn.classList.remove('selected');
                if (parseInt(btn.dataset.strokes) === parValue) {
                    btn.classList.add('selected');
                }
            });
        }
        
        // Update member dropdown when team changes
        function updateMembers() {
            const teamSelect = document.getElementById('teamSelect');
            const memberSelect = document.getElementById('memberSelect');
            const selectedTeamName = teamSelect.value;
            
            memberSelect.innerHTML = '<option value="">-- Select Member --</option>';
            
            if (selectedTeamName) {
                const team = TEAMS.find(t => t.name === selectedTeamName);
                if (team && team.members) {
                    team.members.forEach(member => {
                        const option = document.createElement('option');
                        option.value = member;
                        option.textContent = member;
                        memberSelect.appendChild(option);
                    });
                }
            }
        }
        
        // Load config on page load
        loadConfig();
        
        
        // ============================================================
        // STROKE SELECTION
        // ============================================================
        
        document.querySelectorAll('.stroke-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.stroke-btn').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                const strokeValue = parseInt(this.dataset.strokes);
                // Map to MS Form dropdown values
                if (strokeValue === 1) {
                    selectedStrokes = "Hole in One!";
                } else if (strokeValue === 10) {
                    selectedStrokes = "10+";
                } else {
                    selectedStrokes = strokeValue.toString();
                }
            });
        });
        
        // ============================================================
        // SUBMIT SCORE
        // ============================================================
        
        function submitScore() {
            const teamName = document.getElementById('teamSelect').value;
            const memberName = document.getElementById('memberSelect').value;
            const submitBtn = document.getElementById('submitBtn');
            
            // Validation
            if (!teamName) {
                showStatus('Please select your team', 'error');
                document.getElementById('teamSelect').focus();
                return;
            }
            
            if (!memberName) {
                showStatus('Please select team member', 'error');
                document.getElementById('memberSelect').focus();
                return;
            }
            
            // Save team and member for next hole
            localStorage.setItem('minigolf_team', teamName);
            localStorage.setItem('minigolf_member', memberName);
            
            // Build MS Forms URL with pre-filled values (quotes required by MS Forms)
            // Add timestamp to prevent "draft" popup
            const formUrl = MS_FORMS_BASE_URL + 
                '&' + QUESTION_IDS.team + '="' + encodeURIComponent(teamName) + '"' +
                '&' + QUESTION_IDS.member + '="' + encodeURIComponent(memberName) + '"' +
                '&' + QUESTION_IDS.hole + '="' + encodeURIComponent(holeName) + '"' +
                '&' + QUESTION_IDS.strokes + '="' + encodeURIComponent(selectedStrokes) + '"' +
                '&_=' + Date.now();
            
            // Show success message
            const scoreText = selectedStrokes === 1 ? '🎉 HOLE IN ONE!' : 
                             selectedStrokes <= parValue ? '👏 Great shot!' : 
                             'Score recorded!';
            showStatus(`✅ ${scoreText} Redirecting...`, 'success');
            
            // Redirect to MS Forms after brief delay
            setTimeout(() => {
                window.location.href = formUrl;
            }, 500);
        }
        
        function showStatus(message, type) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = 'status ' + type;
        }
        
    </script>
</body>
</html>
